name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  MIX_ENV: test

jobs:
  test:
    name: Test & Code Quality
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trader_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: trade_machine_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.0'
          otp-version: '27.1'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Set up Node.js (for Prisma)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Prisma CLI
        run: npm install -g prisma@4.16.2  # Match TradeMachineServer version which is less strict on view validation

      - name: Download Prisma schema from TypeScript server
        run: |
          mkdir -p prisma
          curl -o prisma/schema.prisma https://raw.githubusercontent.com/${{ github.repository_owner }}/TradeMachineServer/main/prisma/schema.prisma

      - name: Run Prisma migrations
        run: |
          export DATABASE_URL="postgresql://trader_test:test_password@localhost:5432/trade_machine_test?schema=test"
          prisma db push --force-reset

      # prisma db push materializes models (tables) but does not run prisma/migrations/*.sql and does
      # not create PostgreSQL VIEWs declared as Prisma `view` blocks. Elixir queries hydrated_* views.
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply hydrated view SQL from TradeMachineServer
        env:
          PGPASSWORD: test_password
        run: |
          BASE="https://raw.githubusercontent.com/${{ github.repository_owner }}/TradeMachineServer/main/prisma/migrations"
          apply_migration() {
            local dir="$1"
            echo "::group::Applying ${dir}"
            {
              echo "SET search_path TO test;"
              curl -fsSL "${BASE}/${dir}/migration.sql"
            } | psql -v ON_ERROR_STOP=1 -h localhost -p 5432 -U trader_test -d trade_machine_test
            echo "::endgroup::"
          }
          apply_migration "20250527131228_add_views"
          apply_migration "20251002030632_add_missing_test_views"
          apply_migration "20260315222332_update_hydrated_trades_view"

      - name: Install dependencies
        run: mix deps.get

      - name: Check code formatting
        run: mix format --check-formatted

      - name: Run Credo linter
        run: mix credo

      - name: Compile
        run: mix compile

      - name: Run tests with coverage
        run: mix coveralls.lcov
        env:
          DATABASE_HOST: localhost
          DATABASE_USER: trader_test
          DATABASE_PASSWORD: test_password
          DATABASE_NAME: trade_machine_test
          PROD_DATABASE_PORT: 5432
          STAGING_DATABASE_PORT: 5432
          DATABASE_SCHEMA: test
          SCHEMA: test

      - name: Report coverage on PR
        uses: romeovs/lcov-reporter-action@v0.4.0
        if: github.event_name == 'pull_request'
        with:
          lcov-file: ./cover/lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          filter-changed-files: true
