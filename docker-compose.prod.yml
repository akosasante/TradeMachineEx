
services:
  # TradeMachineEx Application (Production)
  app:
    image: ${IMAGE_TAG:-ghcr.io/akosasante/trade-machine-ex:latest}
    container_name: trade_machine_ex_app
    networks:
      - production_trademachine_infra
      - staging_trademachine_infra
      - monitoring
    ports:
      - "4001:4001"
    environment:
      - MIX_ENV=prod
      - PORT=4001
      - ERL_CRASH_DUMP=/tmp/erl_crash.dump

      # Database configuration (external PostgreSQL - Dual Repo Pattern)
      - PROD_DATABASE_HOST=${PROD_DATABASE_HOST:-production_postgres}
      - STAGING_DATABASE_HOST=${STAGING_DATABASE_HOST:-staging_postgres}
      - PROD_DATABASE_USER=${PROD_DATABASE_USER:-production_postgres}
      - STAGING_DATABASE_USER=${STAGING_DATABASE_USER:-staging_postgres}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME:-trade_machine}
      - PROD_DATABASE_PORT=${PROD_DATABASE_PORT:-5432}
      - STAGING_DATABASE_PORT=${STAGING_DATABASE_PORT:-5432}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE:-10}

      # Phoenix configuration
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_HOST=${PHX_HOST}

      # Release configuration
      - RELEASE_COOKIE=${RELEASE_COOKIE}

      # Logging configuration
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Minor league sheet (public CSV export)
      - MINOR_LEAGUE_SHEET_ID=${MINOR_LEAGUE_SHEET_ID}
      - MINOR_LEAGUE_SHEET_GID=${MINOR_LEAGUE_SHEET_GID:-}

      # Job processing configuration
      - ENABLE_CRON=${ENABLE_CRON:-false}
      - OBAN_MINORS_SYNC_CONCURRENCY=${OBAN_MINORS_SYNC_CONCURRENCY:-1}
      - OBAN_DRAFT_SYNC_CONCURRENCY=${OBAN_DRAFT_SYNC_CONCURRENCY:-1}

      # ESPN Fantasy API configuration
      - ESPN_COOKIE=${ESPN_COOKIE}
      - ESPN_SWID=${ESPN_SWID}
      - ESPN_LEAGUE_ID=${ESPN_LEAGUE_ID:-545}
      - ESPN_SEASON_YEAR=${ESPN_SEASON_YEAR}

      # Discord configuration
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}

      # Monitoring configuration
      - GRAFANA_HOST=${GRAFANA_HOST:-}
      - GRAFANA_TOKEN=${GRAFANA_TOKEN:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://alloy:4318}

      # Email configuration (Brevo/SendInBlue) and data needed to populate emails
      - BREVO_API_KEY=${BREVO_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-trades.flexfoxfantasy.com}
      - STAGING_FRONTEND_URL=${STAGING_FRONTEND_URL}
      - STAGING_EMAIL=${STAGING_EMAIL}

      # OpenTelemetry configuration
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_SERVICE_VERSION=${OTEL_SERVICE_VERSION}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_TRACES_SAMPLER=${OTEL_TRACES_SAMPLER:-}
      - OTEL_TRACES_SAMPLER_ARG=${OTEL_TRACES_SAMPLER_ARG:-}

    stop_grace_period: 30s


    # Resource limits for production
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    labels:
      - "service=trade_machine_ex"
      - "environment=production"
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  production_trademachine_infra:
    name: production_trademachine_infra
    external: true
  staging_trademachine_infra:
    name: staging_trademachine_infra
    external: true
  monitoring:
    external: true # App joins the network created by the alloy etc docker compose
