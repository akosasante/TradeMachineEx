
services:
  # TradeMachineEx Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"  # Phoenix application (includes /metrics endpoint via PromEx plug)
    environment:
      - ERL_AFLAGS=-kernel shell_history enabled shell_history_path '"/app/.erlang_history"'
      - MIX_ENV=dev
      - PORT=${PORT}
      # Database configuration - dual repo support
      - PROD_DATABASE_HOST=${PROD_DATABASE_HOST:-${DATABASE_HOST}}
      - STAGING_DATABASE_HOST=${STAGING_DATABASE_HOST:-${DATABASE_HOST}}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - PROD_DATABASE_PORT=${PROD_DATABASE_PORT:-${DATABASE_PORT}}
      - STAGING_DATABASE_PORT=${STAGING_DATABASE_PORT:-${DATABASE_PORT}}
      - DATABASE_POOL_SIZE=${DATABASE_POOL_SIZE}
      - DATABASE_SCHEMA=${DATABASE_SCHEMA}
      - PROD_SCHEMA=${PROD_SCHEMA}
      - STAGING_SCHEMA=${STAGING_SCHEMA}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_HOST=${PHX_HOST}
      - LOG_LEVEL=${LOG_LEVEL}
      - GOOGLE_SHEETS_CREDS_PATH=${GOOGLE_SHEETS_CREDS_PATH}
      - GOOGLE_SPREADSHEET_ID=${GOOGLE_SPREADSHEET_ID}
      # Minor league sheet (public CSV export)
      - MINOR_LEAGUE_SHEET_ID=${MINOR_LEAGUE_SHEET_ID}
      - MINOR_LEAGUE_SHEET_GID=${MINOR_LEAGUE_SHEET_GID:-}
      - ENABLE_CRON=${ENABLE_CRON}
      - OBAN_MINORS_SYNC_CONCURRENCY=${OBAN_MINORS_SYNC_CONCURRENCY}
      - OBAN_DRAFT_SYNC_CONCURRENCY=${OBAN_DRAFT_SYNC_CONCURRENCY}
      - GRAFANA_HOST=${GRAFANA_HOST}
      - GRAFANA_TOKEN=${GRAFANA_TOKEN}
      - GIT_SHA=${GIT_SHA}
      # OpenTelemetry configuration
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_SERVICE_VERSION=${OTEL_SERVICE_VERSION}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_TRACES_SAMPLER=${OTEL_TRACES_SAMPLER}
      - OTEL_TRACES_SAMPLER_ARG=${OTEL_TRACES_SAMPLER_ARG}
      - OTEL_LOG_LEVEL=${OTEL_LOG_LEVEL}
      # ESPN auth stuff
      - ESPN_COOKIE=${ESPN_COOKIE}
      - ESPN_SWID=${ESPN_SWID}
      - ESPN_LEAGUE_ID=${ESPN_LEAGUE_ID}
    volumes:
      # Mount source code for development
      - .:/app
      - /app/_build
      - /app/deps
      - /app/assets/node_modules
      # Prevent Elixir/Erlang cache files from persisting on host
      - /app/.mix
      - /app/.hex
      - /app/.cache
      - /root/.mix
      - /root/.hex
      - /root/.cache
      # Persist IEx/Erlang shell history across container restarts
      - erlang_history:/app/.erlang_history
      # Mount Google Sheets credentials if available locally
      - ${GOOGLE_SHEETS_CREDS_FILE:-./sheet_creds.json}:/app/sheet_creds.json:ro
    networks:
      # Connect to shared infrastructure network
      - trade_machine_shared
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Note: No depends_on since external services might not be defined in this compose file

volumes:
  erlang_history:

# Use the shared infrastructure network
networks:
  trade_machine_shared:
    external: true
    name: trade_machine_shared
